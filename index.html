<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página de Teste</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f5f5f5;
            color: #333;
        }

        h1 {
            color: #2c3e50;
        }

        .card {
            background: white;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.1);
        }

        button {
            background-color: #3498db;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover {
            background-color: #2980b9;
        }
    </style>
</head>

<body>

    <h1>🚀 Repositório de Teste</h1>

    <div class="card">
        <h2>Sobre este projeto</h2>
        <p>Este é um repositório criado para aprender branch protection rules no GitHub.</p>
    </div>

    <div class="card">
        <h2>Interação</h2>
        <p id="mensagem">Clique no botão abaixo para testar o JavaScript.</p>
        <button onclick="document.getElementById('mensagem').textContent = '✅ JavaScript funcionando!'">
            Testar
        </button>
    </div>

</body>

</html>
